<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Cosmic Particles</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #020205; font-family: 'Outfit', sans-serif;
            color: white; user-select: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        
        .glass-panel {
            background: rgba(20, 20, 35, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
        }

        #status {
            position: absolute; top: 20px; left: 20px;
            padding: 12px 24px; font-weight: 300; letter-spacing: 1px;
            display: flex; align-items: center; gap: 10px;
            transition: opacity 0.5s;
        }
        .indicator { width: 10px; height: 10px; border-radius: 50%; background: #f39c12; box-shadow: 0 0 10px #f39c12; }
        .indicator.active { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }

        #control-panel {
            position: absolute; top: 20px; right: 20px;
            width: 280px; padding: 25px;
            display: flex; flex-direction: column; gap: 20px;
        }

        h2 { margin: 0; font-size: 1.2rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; color: rgba(255, 255, 255, 0.7); text-transform: uppercase; letter-spacing: 1px;}
        
        select {
            width: 100%; padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; border-radius: 8px; font-family: 'Outfit', sans-serif;
            outline: none; cursor: pointer; transition: all 0.3s;
        }
        select:hover { border-color: rgba(0, 255, 204, 0.5); }
        select option { background: #111; color: white; }

        .toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle input { display: none; }
        .slider { width: 40px; height: 20px; background: rgba(0, 0, 0, 0.5); border-radius: 20px; position: relative; border: 1px solid rgba(255, 255, 255, 0.2); transition: 0.3s;}
        .slider::before { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; left: 2px; top: 2px; background: white; transition: 0.3s; }
        input:checked + .slider { background: rgba(0, 255, 204, 0.3); border-color: #00ffcc; }
        input:checked + .slider::before { transform: translateX(20px); background: #00ffcc; box-shadow: 0 0 10px #00ffcc;}
        .toggle-text { font-size: 0.9rem; }
        
        #video-container { position: absolute; bottom: 20px; left: 20px; border-radius: 12px; overflow: hidden; opacity: 0; pointer-events: none;}
        video { width: 160px; height: 120px; object-fit: cover; transform: scaleX(-1); }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui-layer">
        <div id="status" class="glass-panel">
            <div class="indicator" id="status-dot"></div>
            <span id="status-text">INITIALIZING...</span>
        </div>

        <div id="control-panel" class="glass-panel">
            <h2>Cosmic settings</h2>
            
            <div class="control-group">
                <label>Formation</label>
                <select id="shape-select">
                    <option value="sphere">Sphere</option>
                    <option value="cube">Cube</option>
                    <option value="torus">Torus (Ring)</option>
                    <option value="spiral">Spiral (DNA)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Particle Density</label>
                <select id="density-select">
                    <option value="4000">4,000</option>
                    <option value="8000" selected>8,000</option>
                    <option value="15000">15,000</option>
                </select>
            </div>

            <div class="control-group" style="margin-top: 10px;">
                <label class="toggle">
                    <input type="checkbox" id="follow-hand" checked>
                    <div class="slider"></div>
                    <span class="toggle-text">Follow Hand Position</span>
                </label>
            </div>

            <div class="control-group">
                <label class="toggle">
                    <input type="checkbox" id="auto-rotate" checked>
                    <div class="slider"></div>
                    <span class="toggle-text">Auto Rotation</span>
                </label>
            </div>
        </div>
        
        <div id="video-container" class="glass-panel">
            <video id="input_video" playsinline></video>
        </div>
    </div>

    <script>
        // --------- THREE.JS SETUP ---------
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.0015);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 600;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        let particleCount = 8000;
        let particles;
        let currentPositions, targetPositions;
        let currentColors;
        let currentSizes, targetSizes;
        let currentShape = 'sphere';
        let geometry, material;

        const coolColor = new THREE.Color(0x00ccff); // Cyan/Blue
        const hotColor = new THREE.Color(0xff00ff);  // Magenta/Pink

        function initParticles(count) {
            particleCount = count;
            if(particles) scene.remove(particles);

            geometry = new THREE.BufferGeometry();
            
            currentPositions = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);
            
            currentColors = new Float32Array(particleCount * 3);

            currentSizes = new Float32Array(particleCount);
            targetSizes = new Float32Array(particleCount);

            // Initialize with random positions
            for(let i=0; i<particleCount; i++) {
                const i3 = i * 3;
                currentPositions[i3] = (Math.random() - 0.5) * 800;
                currentPositions[i3+1] = (Math.random() - 0.5) * 800;
                currentPositions[i3+2] = (Math.random() - 0.5) * 800;
                
                coolColor.toArray(currentColors, i3);
                
                currentSizes[i] = Math.random() * 2 + 1;
                targetSizes[i] = currentSizes[i];
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(currentColors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(currentSizes, 1));

            // Custom shader for circular glowy particles with Perlin-like noise
            const vertexShader = `
                attribute float size;
                varying vec3 vColor;
                uniform float time;
                void main() {
                    vColor = color;
                    vec3 pos = position;
                    // Breathing & perlin-like movement
                    pos.x += sin(time * 2.0 + position.y * 0.01) * 2.0;
                    pos.y += cos(time * 1.5 + position.x * 0.01) * 2.0;
                    pos.z += sin(time * 1.0 + position.z * 0.01) * 2.0;
                    
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_PointSize = size * (300.0 / -mvPosition.z) * (1.0 + 0.2 * sin(time * 3.0 + position.x * 0.05));
                    gl_Position = projectionMatrix * mvPosition;
                }
            `;
            
            const fragmentShader = `
                varying vec3 vColor;
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.1, dist);
                    gl_FragColor = vec4(vColor, alpha * 0.8);
                }
            `;

            material = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader,
                fragmentShader,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            updateShape(currentShape);
        }

        function updateShape(shape) {
            currentShape = shape;
            for(let i=0; i<particleCount; i++) {
                const i3 = i * 3;
                let x, y, z;

                if (shape === 'sphere') {
                    const phi = Math.acos(-1 + (2 * i) / particleCount);
                    const theta = Math.sqrt(particleCount * Math.PI) * phi;
                    const r = 250;
                    x = r * Math.cos(theta) * Math.sin(phi);
                    y = r * Math.sin(theta) * Math.sin(phi);
                    z = r * Math.cos(phi);
                } 
                else if (shape === 'cube') {
                    const s = 300;
                    x = (Math.random() - 0.5) * s;
                    y = (Math.random() - 0.5) * s;
                    z = (Math.random() - 0.5) * s;
                }
                else if (shape === 'torus') {
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI * 2;
                    const R = 200;
                    const r = 60 + Math.random() * 20;
                    x = (R + r * Math.cos(v)) * Math.cos(u);
                    y = (R + r * Math.cos(v)) * Math.sin(u);
                    z = r * Math.sin(v);
                }
                else if (shape === 'spiral') {
                    const t = (i / particleCount) * Math.PI * 20; 
                    const r = Math.sqrt(i) * 3;
                    x = r * Math.cos(t);
                    z = r * Math.sin(t);
                    y = (i / particleCount - 0.5) * 600;
                }

                targetPositions[i3] = x;
                targetPositions[i3+1] = y;
                targetPositions[i3+2] = z;
            }
        }

        initParticles(8000);

        // --------- LOGIC & STATE ---------
        let handTension = 0; // 0 = open, 1 = fist
        let targetGroupPos = new THREE.Vector3(0, 0, 0);
        let currGroupPos = new THREE.Vector3(0, 0, 0);

        // UI Listeners
        document.getElementById('shape-select').addEventListener('change', (e) => updateShape(e.target.value));
        document.getElementById('density-select').addEventListener('change', (e) => {
            initParticles(parseInt(e.target.value));
        });
        
        const uiFollow = document.getElementById('follow-hand');
        const uiRotate = document.getElementById('auto-rotate');

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------- MEDIAPIPE SETUP ---------
        const videoElement = document.getElementById('input_video');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        function setStatus(text, active=false) {
            statusText.innerText = text;
            if(active) statusDot.classList.add('active');
            else statusDot.classList.remove('active');
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                setStatus('TRACKING', true);
                const landmarks = results.multiHandLandmarks[0];
                
                // Tension Calculation (Open vs Fist)
                let dist = 0;
                const tips = [8, 12, 16, 20];
                const palm = landmarks[0];
                tips.forEach(tipIdx => {
                    const tip = landmarks[tipIdx];
                    const dx = tip.x - palm.x;
                    const dy = tip.y - palm.y;
                    const dz = tip.z - palm.z;
                    dist += Math.sqrt(dx*dx + dy*dy + dz*dz);
                });
                dist /= 4.0;
                
                // Map distance to tension [0 = Open, 1 = Fist]
                let tension = (0.4 - dist) / (0.4 - 0.15);
                tension = Math.max(0, Math.min(1, tension));
                handTension = THREE.MathUtils.lerp(handTension, tension, 0.2);

                // Hand Position (Middle finger MCP)
                const hx = 1.0 - landmarks[9].x; // Mirrored
                const hy = landmarks[9].y;

                if (uiFollow.checked) {
                    targetGroupPos.x = (hx - 0.5) * 800; // Map screen -> 3D
                    targetGroupPos.y = -(hy - 0.5) * 600;
                } else {
                    targetGroupPos.set(0,0,0);
                }
            } else {
                setStatus('SEARCHING FOR HAND', false);
                handTension = THREE.MathUtils.lerp(handTension, 0, 0.05);
                if (uiFollow.checked) targetGroupPos.lerp(new THREE.Vector3(0,0,0), 0.05);
            }
        });

        const camera_util = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 320,
            height: 240
        });
        
        setStatus('REQUESTING CAMERA...');
        camera_util.start().then(() => {
            setStatus('SEARCHING FOR HAND', false);
        }).catch(err => {
            setStatus('CAMERA ERROR / DENIED', false);
            console.error(err);
        });


        // --------- ANIMATION LOOP ---------
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.elapsedTime;

            if(material) material.uniforms.time.value = time;

            if(particles) {
                if(uiRotate.checked) {
                    particles.rotation.y += delta * 0.1;
                    particles.rotation.x += delta * 0.05;
                } else {
                    particles.rotation.y = THREE.MathUtils.lerp(particles.rotation.y, 0, 0.02);
                    particles.rotation.x = THREE.MathUtils.lerp(particles.rotation.x, 0, 0.02);
                }

                currGroupPos.lerp(targetGroupPos, 0.1);
                particles.position.copy(currGroupPos);

                const posInterp = 0.05;
                const colInterp = 0.1;
                
                // Open Hand: Expand (Scale > 1), Cool Cyan
                // Closed Fist: Contract (Scale < 1), Hot Pink
                const targetScale = THREE.MathUtils.lerp(1.5, 0.3, handTension);
                const targetColObj = coolColor.clone().lerp(hotColor, handTension);
                const explodeFactor = Math.pow(handTension, 3) * 2; // Extra noise for fist implode

                const posAttr = geometry.attributes.position;
                const colAttr = geometry.attributes.color;
                const sizeAttr = geometry.attributes.size;

                for(let i=0; i<particleCount; i++) {
                    const i3 = i * 3;
                    
                    let tx = targetPositions[i3] * targetScale;
                    let ty = targetPositions[i3+1] * targetScale;
                    let tz = targetPositions[i3+2] * targetScale;

                    if (handTension > 0.5) {
                        tx += (Math.random()-0.5) * 100 * explodeFactor;
                        ty += (Math.random()-0.5) * 100 * explodeFactor;
                        tz += (Math.random()-0.5) * 100 * explodeFactor;
                    }

                    currentPositions[i3] = THREE.MathUtils.lerp(currentPositions[i3], tx, posInterp);
                    currentPositions[i3+1] = THREE.MathUtils.lerp(currentPositions[i3+1], ty, posInterp);
                    currentPositions[i3+2] = THREE.MathUtils.lerp(currentPositions[i3+2], tz, posInterp);

                    currentColors[i3] = THREE.MathUtils.lerp(currentColors[i3], targetColObj.r, colInterp);
                    currentColors[i3+1] = THREE.MathUtils.lerp(currentColors[i3+1], targetColObj.g, colInterp);
                    currentColors[i3+2] = THREE.MathUtils.lerp(currentColors[i3+2], targetColObj.b, colInterp);

                    const tSize = targetSizes[i] * (1.0 + handTension * 2.0); // Size increases on fist
                    currentSizes[i] = THREE.MathUtils.lerp(currentSizes[i], tSize, 0.1);
                }

                posAttr.needsUpdate = true;
                colAttr.needsUpdate = true;
                sizeAttr.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
